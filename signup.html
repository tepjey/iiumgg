<!-- signup.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GardenGigs Signup</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="auth.js" defer></script>

</head>

<body class="min-h-screen flex items-center justify-center bg-[#f8f9f4]">

<div class="w-full max-w-md bg-white p-8 rounded-2xl shadow">

  <h1 class="text-2xl font-bold mb-6">Create Account</h1>

  <form onsubmit="signup(event)">
    <input id="name" type="text" placeholder="Full Name" class="w-full p-3 border rounded mb-3" required>

    <input id="email" type="email" placeholder="Email" class="w-full p-3 border rounded mb-3" required>

    <input id="password" type="password" placeholder="Password" class="w-full p-3 border rounded mb-4" required>

    <button class="w-full bg-green-600 text-white py-3 rounded font-bold">
      Sign Up
    </button>
  </form>

  <p class="text-center mt-4 text-sm">
    Already have an account?
    <a href="login.html" class="text-green-700 font-bold">Login</a>
  </p>

</div>

</body>
</html>
